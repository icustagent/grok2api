services:
  grok2api:
    container_name: grok2api
    image: ghcr.io/chenyme/grok2api:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT}:${SERVER_PORT}"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grok2api
      - apinetwork
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: 1.5G

  postgres:
    container_name: grok2api-postgres
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - grok2api_postgres_data:/var/lib/postgresql/data
      # - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grok2api
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: 1.5G
          
networks:
  grok2api:
    name: grok2api
  apinetwork:
    name: apinetwork

# VPS 需使用 volumes
volumes:
  grok2api_postgres_data:
